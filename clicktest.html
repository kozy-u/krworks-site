<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>click test</title>
</head>
<body style="background:#07080c;color:#e0e6ef;font-family:sans-serif;padding:40px;line-height:1.8;">
  <h1>クリックテスト</h1>
  <p style="background:#ff0;color:#000;display:inline-block;padding:4px 10px;border-radius:4px;font-family:monospace;">ビルド: CLICKTEST-A</p>

  <p>下の2つのボタンを順に押してください。</p>

  <button onclick="alert('① inline onclick 動作OK')"
          style="font-size:20px;padding:14px 28px;margin:10px 0;display:block;cursor:pointer;">
    テスト1（inline onclick）
  </button>

  <button id="b2"
          style="font-size:20px;padding:14px 28px;margin:10px 0;display:block;cursor:pointer;">
    テスト2（addEventListener）
  </button>

  <p id="out" style="font-size:18px;margin-top:24px;color:#00f0ff;"></p>

  <script>
    window.onerror = function(m, s, l, c){ alert('JSエラー:\n' + m + '\n行 ' + l); return false; };
    document.getElementById('b2').addEventListener('click', function(){
      alert('② addEventListener 動作OK');
      document.getElementById('out').textContent = 'JSは正常に動作しています（両方OKなら原因はindex.html固有）';
    });
  </script>
</body>
</html>
